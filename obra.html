<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obra San Blas 4 — Seguimiento de instalación</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020817; color: #f1f5f9; font-family: 'Syne', 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 99px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD16SVbJwOeurNHU2F0N5NlSARURb9DF9g",
      authDomain: "san-blas-4-avance.firebaseapp.com",
      databaseURL: "https://san-blas-4-avance-default-rtdb.firebaseio.com",
      projectId: "san-blas-4-avance",
      storageBucket: "san-blas-4-avance.firebasestorage.app",
      messagingSenderId: "533317106558",
      appId: "1:533317106558:web:d2604e80f8b4ec5f7fd12f"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getDatabase(firebaseApp);
    window.__firebaseDb = db;
    window.__firebaseRef = ref;
    window.__firebaseOnValue = onValue;
    window.__firebaseSet = set;
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── ESPERAR FIREBASE ──────────────────────────────────────────────────
    function useFirebase() {
      const [ready, setReady] = useState(!!window.__firebaseDb);
      useEffect(() => {
        if (!window.__firebaseDb) {
          window.addEventListener("firebase-ready", () => setReady(true), { once: true });
        }
      }, []);
      return ready;
    }

    // ─── ESTRUCTURA ────────────────────────────────────────────────────────
    const PISOS = [
      { id: "PB", label: "Planta Baja", short: "PB", depts: 9 },
      { id: "P1", label: "Piso 1",      short: "P1", depts: 10 },
      { id: "P2", label: "Piso 2",      short: "P2", depts: 10 },
      { id: "P3", label: "Piso 3",      short: "P3", depts: 10 },
      { id: "P4", label: "Piso 4",      short: "P4", depts: 10 },
      { id: "P5", label: "Piso 5",      short: "P5", depts: 10 },
      { id: "P6", label: "Piso 6",      short: "P6", depts: 10 },
      { id: "P7", label: "Piso 7",      short: "P7", depts: 10 },
    ];
    const ETAPAS_K = [
      { id: "k1", label: "Armado de estructura" },
      { id: "k2", label: "Instalación de estructura inferior" },
      { id: "k3", label: "Instalación de estructura superior" },
      { id: "k4", label: "Colocación de cajones" },
      { id: "k5", label: "Colocación de frentes y puertas" },
      { id: "k6", label: "Acabados finales" },
    ];
    const ETAPAS_R = [
      { id: "r1", label: "Armado de estructura (patas y fondo)" },
      { id: "r2", label: "Cajones y frentes de cajones" },
      { id: "r3", label: "Colocación de estantes" },
      { id: "r4", label: "Colocación de percheros" },
      { id: "r5", label: "Colocación de vistas" },
      { id: "r6", label: "Acabados finales" },
    ];
    const MAT_K = [
      { id: "mk1", label: "Patas regulables negras", qty: 4 },
      { id: "mk2", label: "Soportes en L con tapas", qty: 4 },
      { id: "mk3", label: "Bisagras rectas con freno", qty: 4 },
      { id: "mk4", label: "Bisagras curvas con freno", qty: 4 },
      { id: "mk5", label: "Guías telescópicas", qty: 2 },
    ];
    const MAT_R = [
      { id: "mr1", label: "Guías telescópicas", qty: 2 },
      { id: "mr2", label: "Soportes de estantes metálicos", qty: 16 },
      { id: "mr3", label: "Cantoneritas blancas", qty: 8 },
      { id: "mr4", label: "Soportes de caño oval", qty: 2 },
    ];
    const DIST_CANO_PB = [
      { n: 1, cortes: "2 × 77.7 cm + 2 × 69.7 cm", sobra: "5.2 cm" },
      { n: 2, cortes: "3 × 77.7 cm", sobra: "66.9 cm" },
      { n: 3, cortes: "2 × 77.7 cm", sobra: "144.6 cm" },
    ];
    const DIST_CANO_PISO = [
      { n: 1, cortes: "2 × 77.7 cm + 2 × 69.7 cm", sobra: "5.2 cm" },
      { n: 2, cortes: "3 × 77.7 cm", sobra: "66.9 cm" },
      { n: 3, cortes: "2 × 77.7 cm + 1 × 69.7 cm", sobra: "74.9 cm" },
    ];

    function freshEtapas(list) {
      return Object.fromEntries(list.map(e => [e.id, { done: false, nota: "" }]));
    }
    function freshDept() {
      return { k: freshEtapas(ETAPAS_K), r: freshEtapas(ETAPAS_R) };
    }
    function buildInitialState() {
      const s = {};
      PISOS.forEach(p => { for (let d = 1; d <= p.depts; d++) s[`${p.id}-D${d}`] = freshDept(); });
      return s;
    }
    function calcDeptProgress(dept) {
      if (!dept) return 0;
      const all = [...ETAPAS_K.map(e => dept.k?.[e.id]?.done ?? false), ...ETAPAS_R.map(e => dept.r?.[e.id]?.done ?? false)];
      return Math.round(all.filter(Boolean).length / all.length * 100);
    }
    function calcSecProgress(dept, sec, list) {
      if (!dept) return 0;
      return Math.round(list.filter(e => dept[sec]?.[e.id]?.done).length / list.length * 100);
    }
    function etapaLabel(p) { return p === 0 ? "Pendiente" : p < 100 ? "En proceso" : "Terminado"; }
    const ETAPA_COLOR = { Pendiente: "#475569", "En proceso": "#f59e0b", Terminado: "#22c55e" };

    // ─── BASE COMPONENTS ───────────────────────────────────────────────────
    function Bar({ value, h = 5, color }) {
      const c = color ?? (value === 100 ? "#22c55e" : value > 0 ? "#f59e0b" : "#1e293b");
      return (
        <div style={{ background: "#0f172a", borderRadius: 99, height: h, overflow: "hidden" }}>
          <div style={{ width: `${value}%`, height: "100%", background: c, borderRadius: 99, transition: "width .35s ease" }} />
        </div>
      );
    }
    function Chip({ label }) {
      const c = ETAPA_COLOR[label] ?? "#475569";
      return <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: 0.8, textTransform: "uppercase", color: c, border: `1px solid ${c}55`, borderRadius: 4, padding: "2px 7px", background: `${c}15`, whiteSpace: "nowrap" }}>{label}</span>;
    }

    // ─── ETAPA ROW ─────────────────────────────────────────────────────────
    function EtapaRow({ etapa, data, onChange, index }) {
      const [editNota, setEditNota] = useState(false);
      const [notaTmp, setNotaTmp] = useState(data.nota || "");
      function saveNota() { onChange({ ...data, nota: notaTmp.trim() }); setEditNota(false); }
      return (
        <div style={{ background: data.done ? "#05260f" : "#0d1424", border: `1px solid ${data.done ? "#22c55e30" : "#1e293b"}`, borderRadius: 10, overflow: "hidden", transition: "background .2s" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 13px" }}>
            <span style={{ color: "#1e3a5f", fontSize: 11, fontFamily: "monospace", minWidth: 14, textAlign: "right" }}>{index + 1}</span>
            <div onClick={() => onChange({ ...data, done: !data.done })} style={{ width: 22, height: 22, borderRadius: 6, cursor: "pointer", flexShrink: 0, border: `2px solid ${data.done ? "#22c55e" : "#334155"}`, background: data.done ? "#22c55e" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s" }}>
              {data.done && <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
            <span style={{ flex: 1, fontSize: 13, color: data.done ? "#475569" : "#cbd5e1", textDecoration: data.done ? "line-through" : "none" }}>{etapa.label}</span>
            <button onClick={() => { setNotaTmp(data.nota || ""); setEditNota(!editNota); }} style={{ background: data.nota ? "#1e3a5f" : "transparent", border: `1px solid ${data.nota ? "#3b82f630" : "#1e293b"}`, borderRadius: 6, color: data.nota ? "#60a5fa" : "#334155", width: 26, height: 26, cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              {data.nota ? "📝" : "+"}
            </button>
          </div>
          {data.nota && !editNota && (
            <div onClick={() => { setNotaTmp(data.nota); setEditNota(true); }} style={{ margin: "0 13px 10px 47px", background: "#0f172a", borderRadius: 7, padding: "6px 10px", color: "#64748b", fontSize: 12, fontStyle: "italic", cursor: "pointer", borderLeft: "2px solid #1e3a8a" }}>{data.nota}</div>
          )}
          {editNota && (
            <div style={{ margin: "0 13px 11px 47px", display: "flex", gap: 6 }}>
              <input autoFocus value={notaTmp} onChange={e => setNotaTmp(e.target.value)} onKeyDown={e => { if (e.key === "Enter") saveNota(); if (e.key === "Escape") setEditNota(false); }} placeholder="Nota para esta etapa..." style={{ flex: 1, background: "#0f172a", border: "1px solid #334155", borderRadius: 7, padding: "7px 10px", color: "#f1f5f9", fontSize: 12, outline: "none" }} />
              <button onClick={saveNota} style={{ background: "#22c55e20", border: "1px solid #22c55e40", borderRadius: 7, color: "#22c55e", padding: "6px 10px", cursor: "pointer", fontSize: 13, fontWeight: 700 }}>✓</button>
              <button onClick={() => setEditNota(false)} style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#475569", padding: "6px 10px", cursor: "pointer", fontSize: 13 }}>✕</button>
            </div>
          )}
        </div>
      );
    }

    // ─── DEPT MODAL ────────────────────────────────────────────────────────
    function DeptModal({ deptKey, data, onClose, onSave, saving }) {
      const [local, setLocal] = useState(() => JSON.parse(JSON.stringify(data)));
      const [tab, setTab] = useState("k");
      const totalProg = calcDeptProgress(local);
      const kProg = calcSecProgress(local, "k", ETAPAS_K);
      const rProg = calcSecProgress(local, "r", ETAPAS_R);
      const kDone = ETAPAS_K.filter(e => local.k?.[e.id]?.done).length;
      const rDone = ETAPAS_R.filter(e => local.r?.[e.id]?.done).length;
      const [pisoLabel, dNum] = (() => { const [pid, dn] = deptKey.split("-"); return [PISOS.find(p => p.id === pid)?.label || pid, dn.replace("D","")]; })();
      function update(sec, id, nd) { setLocal(prev => ({ ...prev, [sec]: { ...prev[sec], [id]: nd } })); }
      const secList = tab === "k" ? ETAPAS_K : ETAPAS_R;
      const secProg = tab === "k" ? kProg : rProg;
      const secDone = tab === "k" ? kDone : rDone;
      return (
        <div onClick={e => e.target === e.currentTarget && onClose()} style={{ position: "fixed", inset: 0, background: "rgba(2,6,23,.93)", backdropFilter: "blur(8px)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <div style={{ background: "#0d1424", border: "1px solid #1e293b", borderRadius: 20, width: "100%", maxWidth: 520, maxHeight: "93vh", display: "flex", flexDirection: "column", overflow: "hidden", boxShadow: "0 30px 70px rgba(0,0,0,.7)" }}>
            <div style={{ padding: "20px 22px 16px", borderBottom: "1px solid #1e293b" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
                <div>
                  <div style={{ color: "#1e3a5f", fontSize: 9, fontFamily: "monospace", letterSpacing: 2, textTransform: "uppercase" }}>{pisoLabel}</div>
                  <div style={{ fontSize: 28, fontWeight: 900, letterSpacing: -1, color: "#f1f5f9", lineHeight: 1.1 }}>Depto {dNum}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ color: "#1e3a5f", fontSize: 9, letterSpacing: 1.5 }}>AVANCE TOTAL</div>
                    <div style={{ fontSize: 34, fontWeight: 900, fontFamily: "monospace", lineHeight: 1, color: totalProg === 100 ? "#22c55e" : totalProg > 0 ? "#f59e0b" : "#334155" }}>{totalProg}<span style={{ fontSize: 14 }}>%</span></div>
                  </div>
                  <button onClick={onClose} style={{ background: "#1e293b", border: "none", color: "#475569", borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
                </div>
              </div>
              <Bar value={totalProg} h={6} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 10 }}>
                {[{ label: "🍳 Kitchenette", p: kProg, d: kDone, t: ETAPAS_K.length, c: "#3b82f6" }, { label: "🚪 Ropero", p: rProg, d: rDone, t: ETAPAS_R.length, c: "#8b5cf6" }].map(s => (
                  <div key={s.label} style={{ background: "#0f172a", borderRadius: 8, padding: "8px 10px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                      <span style={{ fontSize: 10, color: "#475569" }}>{s.label}</span>
                      <span style={{ fontFamily: "monospace", fontSize: 10, color: s.p === 100 ? "#22c55e" : "#64748b" }}>{s.d}/{s.t}</span>
                    </div>
                    <Bar value={s.p} h={3} color={s.c} />
                  </div>
                ))}
              </div>
            </div>
            <div style={{ display: "flex", borderBottom: "1px solid #1e293b" }}>
              {[{ id: "k", label: "🍳 Kitchenette", prog: kProg, c: "#3b82f6" }, { id: "r", label: "🚪 Ropero", prog: rProg, c: "#8b5cf6" }].map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, padding: "13px 8px", background: "none", border: "none", borderBottom: tab === t.id ? `2px solid ${t.c}` : "2px solid transparent", color: tab === t.id ? "#f1f5f9" : "#475569", cursor: "pointer" }}>
                  <div style={{ fontSize: 13, fontWeight: 800 }}>{t.label}</div>
                  <div style={{ fontSize: 11, fontFamily: "monospace", marginTop: 3, color: t.prog === 100 ? "#22c55e" : t.prog > 0 ? "#f59e0b" : "#334155" }}>{t.prog}%</div>
                </button>
              ))}
            </div>
            <div style={{ padding: "11px 22px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ color: "#334155", fontSize: 11 }}>{secDone} de {secList.length} etapas completadas</span>
              <Chip label={etapaLabel(secProg)} />
            </div>
            <div style={{ overflowY: "auto", flex: 1, padding: "12px 22px 22px", display: "flex", flexDirection: "column", gap: 6 }}>
              {secList.map((e, i) => (
                <EtapaRow key={e.id} etapa={e} index={i} data={local[tab]?.[e.id] || { done: false, nota: "" }} onChange={nd => update(tab, e.id, nd)} />
              ))}
            </div>
            <div style={{ padding: "14px 22px", borderTop: "1px solid #1e293b", display: "flex", gap: 10 }}>
              <button onClick={onClose} style={{ flex: 1, padding: 12, background: "#1e293b", border: "1px solid #334155", borderRadius: 10, color: "#64748b", cursor: "pointer", fontWeight: 600, fontSize: 14 }}>Cancelar</button>
              <button onClick={() => { onSave(local); onClose(); }} disabled={saving} style={{ flex: 2, padding: 12, background: saving ? "#1e3a5f" : "#3b82f6", border: "none", borderRadius: 10, color: "#fff", cursor: saving ? "default" : "pointer", fontWeight: 800, fontSize: 14 }}>
                {saving ? "Guardando..." : "Guardar cambios"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── INVENTARIO MODAL ──────────────────────────────────────────────────
    function InventarioModal({ state, onClose }) {
      const [tab, setTab] = useState("resumen");
      const allKeys = Object.keys(state);
      const totalDepts = allKeys.length;
      const termK = allKeys.filter(k => calcSecProgress(state[k], "k", ETAPAS_K) === 100).length;
      const termR = allKeys.filter(k => calcSecProgress(state[k], "r", ETAPAS_R) === 100).length;
      const matKCalc = MAT_K.map(m => ({ ...m, total: m.qty * totalDepts, usados: m.qty * termK, restantes: m.qty * (totalDepts - termK) }));
      const matRCalc = MAT_R.map(m => ({ ...m, total: m.qty * totalDepts, usados: m.qty * termR, restantes: m.qty * (totalDepts - termR) }));
      function MatCard({ m, color }) {
        const pct = m.total > 0 ? Math.round(m.usados / m.total * 100) : 0;
        return (
          <div style={{ background: "#0d1424", border: "1px solid #1e293b", borderRadius: 12, padding: "13px 15px", marginBottom: 8 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ color: "#cbd5e1", fontSize: 13, fontWeight: 600 }}>{m.label}</span>
              <span style={{ color: "#334155", fontSize: 11 }}>{m.qty} × depto</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 8 }}>
              {[{ l: "TOTAL", v: m.total, c: "#f1f5f9" }, { l: "USADOS", v: m.usados, c: "#22c55e" }, { l: "RESTANTES", v: m.restantes, c: "#f59e0b" }].map(s => (
                <div key={s.l} style={{ background: "#0f172a", borderRadius: 8, padding: "8px 4px", textAlign: "center" }}>
                  <div style={{ fontFamily: "monospace", fontWeight: 900, fontSize: 18, color: s.c }}>{s.v}</div>
                  <div style={{ fontSize: 8, color: "#334155", letterSpacing: 0.6, marginTop: 1 }}>{s.l}</div>
                </div>
              ))}
            </div>
            <Bar value={pct} h={4} color={color} />
            <div style={{ textAlign: "right", color: "#334155", fontSize: 10, marginTop: 3 }}>{pct}% utilizado</div>
          </div>
        );
      }
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(2,6,23,.93)", backdropFilter: "blur(8px)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <div style={{ background: "#0d1424", border: "1px solid #1e293b", borderRadius: 20, width: "100%", maxWidth: 560, maxHeight: "93vh", display: "flex", flexDirection: "column", overflow: "hidden", boxShadow: "0 30px 70px rgba(0,0,0,.7)" }}>
            <div style={{ padding: "20px 22px 0", borderBottom: "1px solid #1e293b" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <div>
                  <div style={{ color: "#334155", fontSize: 9, fontFamily: "monospace", letterSpacing: 2 }}>8 PISOS · {totalDepts} DEPTOS</div>
                  <div style={{ fontSize: 20, fontWeight: 900, color: "#f1f5f9" }}>Inventario de materiales</div>
                </div>
                <button onClick={onClose} style={{ background: "#1e293b", border: "none", color: "#475569", borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 20 }}>×</button>
              </div>
              <div style={{ display: "flex", gap: 2, overflowX: "auto" }}>
                {[{ id: "resumen", l: "📦 Resumen" }, { id: "k", l: "🍳 Kitchenette" }, { id: "r", l: "🚪 Ropero" }, { id: "cano", l: "📏 Caño oval" }].map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)} style={{ padding: "10px 12px", background: "none", border: "none", borderBottom: tab === t.id ? "2px solid #3b82f6" : "2px solid transparent", color: tab === t.id ? "#f1f5f9" : "#475569", cursor: "pointer", fontSize: 12, fontWeight: 700, whiteSpace: "nowrap" }}>{t.l}</button>
                ))}
              </div>
            </div>
            <div style={{ overflowY: "auto", flex: 1, padding: 20 }}>
              {tab === "resumen" && (
                <div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 18 }}>
                    {[{ l: "Kitchenettes listos", v: `${termK}/${totalDepts}`, c: "#3b82f6" }, { l: "Roperos listos", v: `${termR}/${totalDepts}`, c: "#8b5cf6" }, { l: "Caños ovales totales", v: "24 caños", c: "#f59e0b" }, { l: "Total departamentos", v: totalDepts, c: "#22c55e" }].map(s => (
                      <div key={s.l} style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: "14px 15px" }}>
                        <div style={{ fontFamily: "monospace", fontWeight: 900, fontSize: 20, color: s.c }}>{s.v}</div>
                        <div style={{ color: "#475569", fontSize: 11, marginTop: 3 }}>{s.l}</div>
                      </div>
                    ))}
                  </div>
                  {[...MAT_K.map(m => ({ ...m, tipo: "K" })), ...MAT_R.map(m => ({ ...m, tipo: "R" }))].map(m => (
                    <div key={m.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 10, marginBottom: 6 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 9, background: m.tipo === "K" ? "#1e3a5f" : "#2d1b69", color: m.tipo === "K" ? "#3b82f6" : "#8b5cf6", borderRadius: 4, padding: "2px 7px", fontWeight: 800 }}>{m.tipo === "K" ? "KIT" : "ROP"}</span>
                        <span style={{ color: "#cbd5e1", fontSize: 13 }}>{m.label}</span>
                      </div>
                      <span style={{ fontFamily: "monospace", fontWeight: 900, fontSize: 18, color: "#f1f5f9" }}>{m.qty * totalDepts}</span>
                    </div>
                  ))}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 10, marginTop: 6 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 9, background: "#451a03", color: "#f59e0b", borderRadius: 4, padding: "2px 7px", fontWeight: 800 }}>ROP</span>
                      <span style={{ color: "#cbd5e1", fontSize: 13 }}>Caño oval (3 m)</span>
                    </div>
                    <span style={{ fontFamily: "monospace", fontWeight: 900, fontSize: 18, color: "#f1f5f9" }}>24</span>
                  </div>
                </div>
              )}
              {tab === "k" && matKCalc.map(m => <MatCard key={m.id} m={m} color="#3b82f6" />)}
              {tab === "r" && matRCalc.map(m => <MatCard key={m.id} m={m} color="#8b5cf6" />)}
              {tab === "cano" && (
                <div>
                  <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: "15px 16px", marginBottom: 16 }}>
                    <div style={{ fontFamily: "monospace", fontWeight: 900, fontSize: 28, color: "#f59e0b" }}>24 caños de 3 m</div>
                    <div style={{ color: "#64748b", fontSize: 13, marginTop: 4 }}>3 (PB) + 3 × 7 pisos = 24 total</div>
                  </div>
                  {[
                    { label: "Planta Baja", badge: "PB", sub: "7 × 77.7 cm + 2 × 69.7 cm", dist: DIST_CANO_PB, extra: "" },
                    { label: "Pisos 1 al 7", badge: "P1–P7", sub: "7 × 77.7 cm + 3 × 69.7 cm (igual por piso)", dist: DIST_CANO_PISO, extra: "× 7 pisos = 21 caños" },
                  ].map(g => (
                    <div key={g.badge} style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: "15px 16px", marginBottom: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                        <span style={{ background: "#1e3a5f", color: "#3b82f6", borderRadius: 6, padding: "3px 10px", fontSize: 11, fontWeight: 900 }}>{g.badge}</span>
                        <div>
                          <div style={{ fontWeight: 700, fontSize: 15, color: "#f1f5f9" }}>{g.label}</div>
                          <div style={{ color: "#475569", fontSize: 11, marginTop: 1 }}>{g.sub}</div>
                        </div>
                      </div>
                      {g.dist.map(row => (
                        <div key={row.n} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 12px", background: "#0d1424", borderRadius: 8, marginBottom: 5 }}>
                          <div>
                            <span style={{ color: "#334155", fontSize: 10, fontFamily: "monospace" }}>CAÑO {row.n}   </span>
                            <span style={{ color: "#cbd5e1", fontSize: 13, fontWeight: 600 }}>{row.cortes}</span>
                          </div>
                          <span style={{ color: "#475569", fontSize: 11, fontFamily: "monospace" }}>sobra {row.sobra}</span>
                        </div>
                      ))}
                      {g.extra && <div style={{ textAlign: "right", color: "#475569", fontSize: 11, marginTop: 6 }}>{g.extra}</div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── APP PRINCIPAL ─────────────────────────────────────────────────────
    function ObraApp() {
      const firebaseReady = useFirebase();
      const [state, setState] = useState(buildInitialState());
      const [synced, setSynced] = useState(false);
      const [online, setOnline] = useState(true);
      const [saving, setSaving] = useState(false);
      const [selPiso, setSelPiso] = useState("PB");
      const [openDept, setOpenDept] = useState(null);
      const [vista, setVista] = useState("piso");
      const [showInv, setShowInv] = useState(false);
      const localRef = useRef(state);

      useEffect(() => {
        if (!firebaseReady) return;
        const db = window.__firebaseDb;
        const dbRef = window.__firebaseRef(db, "obra");
        const unsub = window.__firebaseOnValue(dbRef, snapshot => {
          const val = snapshot.val();
          if (val) {
            const merged = buildInitialState();
            Object.keys(merged).forEach(k => { if (val[k]) merged[k] = val[k]; });
            setState(merged);
            localRef.current = merged;
          }
          setSynced(true);
          setOnline(true);
        }, () => { setOnline(false); setSynced(true); });
        return () => unsub();
      }, [firebaseReady]);

      async function saveDept(key, data) {
        setSaving(true);
        const updated = { ...localRef.current, [key]: data };
        localRef.current = updated;
        setState(updated);
        try {
          await window.__firebaseSet(window.__firebaseRef(window.__firebaseDb, `obra/${key}`), data);
        } catch { setOnline(false); }
        setSaving(false);
      }

      const allKeys = Object.keys(state);
      const total = allKeys.length;
      const terminados = allKeys.filter(k => calcDeptProgress(state[k]) === 100).length;
      const enProceso = allKeys.filter(k => { const p = calcDeptProgress(state[k]); return p > 0 && p < 100; }).length;
      const globalProg = Math.round(allKeys.reduce((a, k) => a + calcDeptProgress(state[k]), 0) / total);
      const pisoCurrent = PISOS.find(p => p.id === selPiso);
      const pisoKeys = Array.from({ length: pisoCurrent.depts }, (_, i) => `${selPiso}-D${i + 1}`);
      const pisoProg = Math.round(pisoKeys.reduce((a, k) => a + calcDeptProgress(state[k] || freshDept()), 0) / pisoKeys.length);

      if (!synced) return (
        <div style={{ minHeight: "100vh", background: "#020817", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
          <div style={{ width: 40, height: 40, border: "3px solid #1e293b", borderTop: "3px solid #3b82f6", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          <div style={{ color: "#334155", fontSize: 13, fontFamily: "monospace" }}>Conectando con Firebase...</div>
        </div>
      );

      return (
        <div style={{ minHeight: "100vh", background: "#020817", color: "#f1f5f9", fontFamily: "'Syne','Segoe UI',sans-serif" }}>
          <div style={{ background: "linear-gradient(180deg,#0d1424 0%,#020817 100%)", borderBottom: "1px solid #0f172a", padding: "20px 16px 0" }}>
            <div style={{ maxWidth: 680, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
                <div>
                  <div style={{ fontSize: 9, color: "#1e293b", letterSpacing: 2.5, textTransform: "uppercase", fontFamily: "monospace" }}>CONTROL DE OBRA · 8 PISOS · {total} DEPTOS</div>
                  <h1 style={{ margin: "4px 0 0", fontSize: 22, fontWeight: 900, letterSpacing: -0.8, color: "#f1f5f9" }}>Seguimiento de instalación</h1>
                  <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 4 }}>
                    <div style={{ width: 7, height: 7, borderRadius: "50%", background: online ? "#22c55e" : "#ef4444", boxShadow: online ? "0 0 6px #22c55e" : "none" }} />
                    <span style={{ fontSize: 10, color: online ? "#22c55e" : "#ef4444", fontFamily: "monospace" }}>{saving ? "Guardando..." : online ? "Sincronizado · Firebase" : "Sin conexión"}</span>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <button onClick={() => setShowInv(true)} style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 9, color: "#64748b", padding: "7px 11px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>📦 Stock</button>
                  <button onClick={() => setVista(vista === "resumen" ? "piso" : "resumen")} style={{ background: vista === "resumen" ? "#1e3a5f" : "#0f172a", border: `1px solid ${vista === "resumen" ? "#3b82f650" : "#1e293b"}`, borderRadius: 9, color: vista === "resumen" ? "#60a5fa" : "#64748b", padding: "7px 11px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
                    {vista === "resumen" ? "↩ Obra" : "📊 Resumen"}
                  </button>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 6, marginBottom: 12 }}>
                {[{ l: "AVANCE", v: `${globalProg}%`, c: "#3b82f6" }, { l: "TERMINADOS", v: terminados, c: "#22c55e" }, { l: "EN PROCESO", v: enProceso, c: "#f59e0b" }, { l: "PENDIENTES", v: total - terminados - enProceso, c: "#334155" }].map(s => (
                  <div key={s.l} style={{ background: "#0d1424", border: "1px solid #1e293b", borderRadius: 9, padding: "9px 6px", textAlign: "center" }}>
                    <div style={{ fontFamily: "monospace", fontWeight: 900, fontSize: 17, color: s.c }}>{s.v}</div>
                    <div style={{ fontSize: 7, color: "#1e293b", letterSpacing: 0.6, marginTop: 2, textTransform: "uppercase" }}>{s.l}</div>
                  </div>
                ))}
              </div>
              <Bar value={globalProg} h={3} />
              {vista === "piso" && (
                <div style={{ display: "flex", gap: 1, overflowX: "auto", marginTop: 14, scrollbarWidth: "none" }}>
                  {PISOS.map(p => {
                    const ks = Array.from({ length: p.depts }, (_, i) => `${p.id}-D${i+1}`);
                    const pp = Math.round(ks.reduce((a, k) => a + calcDeptProgress(state[k] || freshDept()), 0) / ks.length);
                    const active = selPiso === p.id;
                    return (
                      <button key={p.id} onClick={() => setSelPiso(p.id)} style={{ background: active ? "#0f172a" : "transparent", border: active ? "1px solid #1e3a5f" : "1px solid transparent", borderBottom: active ? "2px solid #3b82f6" : "2px solid transparent", borderRadius: "8px 8px 0 0", color: active ? "#f1f5f9" : "#334155", padding: "8px 10px", cursor: "pointer", fontSize: 11, fontWeight: active ? 800 : 500, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, whiteSpace: "nowrap" }}>
                        <span>{p.short}</span>
                        <span style={{ fontSize: 9, fontFamily: "monospace", color: pp === 100 ? "#22c55e" : active ? "#60a5fa" : "#1e3a5f" }}>{pp}%</span>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          <div style={{ maxWidth: 680, margin: "0 auto", padding: "16px 16px 56px" }}>
            {vista === "resumen" && (
              <div>
                <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 14, color: "#64748b" }}>Vista general — todos los pisos</div>
                {PISOS.map(piso => {
                  const ks = Array.from({ length: piso.depts }, (_, i) => `${piso.id}-D${i+1}`);
                  const pp = Math.round(ks.reduce((a, k) => a + calcDeptProgress(state[k] || freshDept()), 0) / ks.length);
                  const term = ks.filter(k => calcDeptProgress(state[k] || freshDept()) === 100).length;
                  const proc = ks.filter(k => { const p = calcDeptProgress(state[k] || freshDept()); return p > 0 && p < 100; }).length;
                  return (
                    <div key={piso.id} style={{ background: "#0d1424", border: "1px solid #1e293b", borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                        <div><span style={{ fontWeight: 800, fontSize: 15 }}>{piso.label}</span><span style={{ color: "#334155", fontSize: 11, marginLeft: 8 }}>{piso.depts} deptos</span></div>
                        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                          <span style={{ color: "#22c55e", fontSize: 11 }}>✓ {term}</span>
                          <span style={{ color: "#f59e0b", fontSize: 11 }}>⟳ {proc}</span>
                          <span style={{ fontFamily: "monospace", fontWeight: 900, fontSize: 16, color: pp === 100 ? "#22c55e" : pp > 0 ? "#f1f5f9" : "#334155" }}>{pp}%</span>
                        </div>
                      </div>
                      <Bar value={pp} h={5} />
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 10 }}>
                        {ks.map(k => {
                          const p = calcDeptProgress(state[k] || freshDept());
                          const col = p === 100 ? "#22c55e" : p > 0 ? "#f59e0b" : "#1e3a5f";
                          const dn = k.split("-D")[1];
                          return <div key={k} title={`Depto ${dn} — ${p}%`} onClick={() => { setSelPiso(piso.id); setVista("piso"); setOpenDept(k); }} style={{ width: 30, height: 30, borderRadius: 7, background: p === 100 ? "#052e16" : p > 0 ? "#451a03" : "#0f172a", border: `1px solid ${col}50`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: col, fontWeight: 800, cursor: "pointer", fontFamily: "monospace" }}>{dn}</div>;
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {vista === "piso" && (
              <div>
                <div style={{ marginBottom: 14 }}>
                  <span style={{ fontWeight: 800, fontSize: 17 }}>{pisoCurrent.label}</span>
                  <span style={{ color: "#334155", fontSize: 12, marginLeft: 8 }}>{pisoCurrent.depts} deptos · {pisoProg}%</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(128px,1fr))", gap: 8 }}>
                  {pisoKeys.map((key, i) => {
                    const dept = state[key] || freshDept();
                    const prog = calcDeptProgress(dept);
                    const kp = calcSecProgress(dept, "k", ETAPAS_K);
                    const rp = calcSecProgress(dept, "r", ETAPAS_R);
                    const kDone = ETAPAS_K.filter(e => dept.k?.[e.id]?.done).length;
                    const rDone = ETAPAS_R.filter(e => dept.r?.[e.id]?.done).length;
                    return (
                      <div key={key} onClick={() => setOpenDept(key)} style={{ background: "#0d1424", border: `1px solid ${prog === 100 ? "#22c55e25" : prog > 0 ? "#f59e0b18" : "#1e293b"}`, borderRadius: 14, padding: "13px 13px 11px", cursor: "pointer", position: "relative", overflow: "hidden" }}>
                        {prog === 100 && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "linear-gradient(90deg,#22c55e,#16a34a)" }} />}
                        {prog > 0 && prog < 100 && <div style={{ position: "absolute", top: 0, left: 0, width: `${prog}%`, height: 3, background: "#f59e0b", transition: "width .4s" }} />}
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 9 }}>
                          <div>
                            <div style={{ color: "#1e3a5f", fontSize: 8, fontFamily: "monospace", letterSpacing: 1 }}>DEPTO</div>
                            <div style={{ fontSize: 26, fontWeight: 900, lineHeight: 1, color: prog === 100 ? "#22c55e" : "#f1f5f9" }}>{i + 1}</div>
                          </div>
                          <div style={{ fontFamily: "monospace", fontWeight: 900, fontSize: 15, color: prog === 100 ? "#22c55e" : prog > 0 ? "#f59e0b" : "#1e293b" }}>{prog}%</div>
                        </div>
                        <Bar value={prog} h={4} />
                        <div style={{ marginTop: 9, display: "flex", flexDirection: "column", gap: 5 }}>
                          <div>
                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                              <span style={{ fontSize: 9, color: "#334155" }}>🍳 Kitchenette</span>
                              <span style={{ fontSize: 9, fontFamily: "monospace", color: kp === 100 ? "#22c55e" : "#334155" }}>{kDone}/{ETAPAS_K.length}</span>
                            </div>
                            <Bar value={kp} h={3} color="#3b82f6" />
                          </div>
                          <div>
                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                              <span style={{ fontSize: 9, color: "#334155" }}>🚪 Ropero</span>
                              <span style={{ fontSize: 9, fontFamily: "monospace", color: rp === 100 ? "#22c55e" : "#334155" }}>{rDone}/{ETAPAS_R.length}</span>
                            </div>
                            <Bar value={rp} h={3} color="#8b5cf6" />
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {openDept && <DeptModal deptKey={openDept} data={state[openDept] || freshDept()} onClose={() => setOpenDept(null)} onSave={d => saveDept(openDept, d)} saving={saving} />}
          {showInv && <InventarioModal state={state} onClose={() => setShowInv(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ObraApp />);
  </script>
</body>
</html>
